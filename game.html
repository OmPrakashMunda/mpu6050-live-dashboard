<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <title>TILT RUN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #080b0f; --surface: #0e1318; --border: #1e2a35;
      --text: #e0eaf4; --muted: #4a6070; --accent: #00aaff;
      --danger: #ff4455; --success: #00dd88; --warn: #ffcc00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    button {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      padding: 6px 14px; font-family: 'Courier New', monospace; font-size: 12px;
      cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: background 0.15s;
    }
    button:hover { background: var(--accent); color: var(--bg); }
    input[type=text] {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; font-family: 'Courier New', monospace; font-size: 12px;
      width: 160px; outline: none;
    }
    input[type=text]:focus { border-color: var(--accent); }
    input[type=text]::placeholder { color: var(--muted); }
    #status-dot { width: 8px; height: 8px; background: var(--danger); display: inline-block; margin-right: 4px; }
    #status-dot.connected { background: var(--success); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #game-canvas { display: block; }
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: rgba(8,11,15,0.92);
    }
    .overlay h1 { font-size: 48px; font-weight: bold; letter-spacing: 12px; color: var(--accent); text-shadow: 0 0 40px var(--accent); }
    .overlay p  { font-size: 12px; letter-spacing: 3px; color: var(--muted); text-align: center; line-height: 2; }
    .overlay .score-big { font-size: 64px; color: var(--warn); letter-spacing: 8px; }
    .overlay .hi { font-size: 13px; color: var(--muted); letter-spacing: 4px; }
    .big-btn {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      padding: 12px 32px; font-family: 'Courier New', monospace; font-size: 14px;
      cursor: pointer; letter-spacing: 4px; text-transform: uppercase;
      transition: background 0.15s; margin-top: 8px;
    }
    .big-btn:hover { background: var(--accent); color: var(--bg); }
    footer {
      text-align: center; padding: 7px; font-size: 10px;
      color: var(--muted); letter-spacing: 2px;
      border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
    }
    footer span { color: var(--danger); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;">
  <div style="font-size:13px;font-weight:bold;letter-spacing:4px;color:var(--accent);">
    MPU<span style="color:var(--muted)">//</span>TILT <span style="color:var(--danger)">_RUN</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <input type="text" id="ip-input" placeholder="192.168.X.X"/>
    <button id="connect-btn">Connect</button>
    <div style="display:flex;align-items:center;gap:6px;margin-left:4px;">
      <div id="status-dot"></div>
      <span id="status-text" style="font-size:11px;color:var(--muted);letter-spacing:1px;">OFFLINE</span>
    </div>
    <div style="margin-left:16px;display:flex;gap:16px;font-size:11px;letter-spacing:2px;">
      <span style="color:var(--muted);">SCORE <span id="hud-score" style="color:var(--warn);">0</span></span>
      <span style="color:var(--muted);">BEST <span id="hud-best" style="color:var(--success);">0</span></span>
      <span style="color:var(--muted);">SPEED <span id="hud-speed" style="color:var(--accent);">1.0x</span></span>
      <span style="color:var(--muted);">ROLL <span id="hud-roll" style="color:var(--accent);">0°</span></span>
    </div>
  </div>
</div>

<!-- GAME AREA -->
<div style="flex:1;position:relative;overflow:hidden;" id="game-wrap">
  <canvas id="game-canvas"></canvas>

  <div class="overlay" id="screen-start">
    <h1>TILT RUN</h1>
    <p>
      TILT LEFT / RIGHT &nbsp;→&nbsp; STEER<br>
      TILT FORWARD &nbsp;→&nbsp; SPEED UP<br>
      TILT BACK &nbsp;→&nbsp; SLOW DOWN<br>
      SHAKE &nbsp;→&nbsp; JUMP<br>
      KEYBOARD: &nbsp; ← → ARROWS &nbsp;|&nbsp; SPACE = JUMP
    </p>
    <button class="big-btn" id="start-btn">START GAME</button>
  </div>

  <div class="overlay" id="screen-over" style="display:none;">
    <h1 style="color:var(--danger);text-shadow:0 0 40px var(--danger);">GAME OVER</h1>
    <div class="score-big" id="final-score">0</div>
    <div class="hi">BEST: <span id="final-best">0</span></div>
    <p id="death-reason" style="color:var(--danger);"></p>
    <button class="big-btn" id="restart-btn">RETRY</button>
  </div>

  <div class="overlay" id="screen-count" style="display:none;background:rgba(8,11,15,0.7);">
    <div style="font-size:96px;font-weight:bold;color:var(--accent);text-shadow:0 0 60px var(--accent);" id="count-num">3</div>
  </div>
</div>

<footer>MADE WITH <span>♥</span> BY OM PRAKASH MUNDA</footer>

<script>
// ═══════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('game-wrap');

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if (state === 'playing') buildPath(); });

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const SEG_HEIGHT      = 80;
const NUM_SEGS        = 40;
const RUNNER_Y_RATIO  = 0.75;
const GRAVITY         = 0.5;
const JUMP_VEL        = -11;
const OBS_Y_RATIO     = 0.4; // single source of truth for obstacle Y within segment

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state       = 'start';
let score       = 0;
let bestScore   = parseInt(localStorage.getItem('tiltrun_best') || '0');
let speed       = 3;
let pathOffset  = 0;
let deathReason = '';
let particles   = [];
let jumpCount   = 0;

document.getElementById('hud-best').textContent = bestScore;

// ── Runner ───────────────────────────────
let runner = { x: 0, y: 0, vy: 0, onGround: true, width: 18, height: 28, dead: false, deathTimer: 0 };

// ── Input ────────────────────────────────
let tiltX     = 0;
let tiltSpeed = 0;
const keys    = {};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'ArrowUp') && state === 'playing') triggerJump();
  if (e.code === 'Space' && state === 'start') startCountdown();
  if (e.code === 'Space' && state === 'dead')  startCountdown();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ═══════════════════════════════════════════
// PATH
// ═══════════════════════════════════════════
let pathSegs = [];

function buildPath() {
  pathSegs = [];
  const W = canvas.width;
  let cx = W / 2;
  let pw = Math.min(W * 0.45, 220);
  for (let i = 0; i < NUM_SEGS; i++) {
    if (i < 5) { pathSegs.push({ centerX: cx, width: pw, type: 'normal', obstacle: false }); continue; }
    cx += (Math.random() - 0.5) * pw * 0.8;
    cx  = Math.max(pw/2 + 20, Math.min(W - pw/2 - 20, cx));
    pw  = Math.max(60, pw - 1.2);
    const type     = Math.random() < 0.15 ? 'narrow' : 'normal';
    const w        = type === 'narrow' ? pw * 0.55 : pw;
    const obstacle = i > 10 && Math.random() < 0.18;
    pathSegs.push({ centerX: cx, width: w, type, obstacle });
  }
}

function extendPath() {
  const W    = canvas.width;
  const last = pathSegs[pathSegs.length - 1];
  let cx = last.centerX, pw = last.width;
  cx += (Math.random() - 0.5) * pw * 0.8;
  cx  = Math.max(pw/2 + 20, Math.min(W - pw/2 - 20, cx));
  pw  = Math.max(55, pw - 0.8);
  const type     = Math.random() < 0.15 ? 'narrow' : 'normal';
  const w        = type === 'narrow' ? pw * 0.55 : pw;
  const obstacle = Math.random() < 0.2;
  pathSegs.push({ centerX: cx, width: w, type, obstacle });
  pathSegs.shift();
}

// ═══════════════════════════════════════════
// OBSTACLE HELPERS — single Y calculation
// ═══════════════════════════════════════════
function getObsRect(seg, i) {
  const runnerScreenY = canvas.height * RUNNER_Y_RATIO;
  const segScreenY    = i * SEG_HEIGHT - pathOffset + runnerScreenY;
  return {
    x: seg.centerX - seg.width * 0.25,
    y: segScreenY  + SEG_HEIGHT * OBS_Y_RATIO,
    w: seg.width   * 0.5,
    h: 16
  };
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
function spawnFire(x, y, count = 1) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 4 - 1,
      life: 1, decay: 0.04 + Math.random() * 0.04,
      size: 4 + Math.random() * 8, type: 'fire'
    });
  }
}

function spawnDust(x, y) {
  for (let i = 0; i < 4; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 2,
      life: 1, decay: 0.06, size: 3 + Math.random() * 4, type: 'dust'
    });
  }
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 6;
    particles.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 1, decay: 0.025, size: 4 + Math.random() * 10, type: 'fire'
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy -= 0.1; p.life -= p.decay; p.size *= 0.97;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    if (p.type === 'fire') {
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      g.addColorStop(0,   '#ffffff');
      g.addColorStop(0.3, '#ffcc00');
      g.addColorStop(0.7, '#ff4455');
      g.addColorStop(1,   'transparent');
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = '#aaccff';
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════
// JUMP
// ═══════════════════════════════════════════
function triggerJump() {
  if (jumpCount < 1 && state === 'playing' && !runner.dead) {
    runner.vy = JUMP_VEL; runner.onGround = false; jumpCount++;
    spawnDust(runner.x, runner.y + runner.height / 2);
  }
}

// ═══════════════════════════════════════════
// DEATH
// ═══════════════════════════════════════════
function killRunner(reason) {
  if (runner.dead) return;
  runner.dead = true; deathReason = reason; state = 'dead';
  spawnExplosion(runner.x, runner.y);
  if (score > bestScore) { bestScore = Math.floor(score); localStorage.setItem('tiltrun_best', bestScore); }
  setTimeout(showGameOver, 1200);
}

function showGameOver() {
  document.getElementById('final-score').textContent = Math.floor(score);
  document.getElementById('final-best').textContent  = bestScore;
  document.getElementById('death-reason').textContent = deathReason;
  document.getElementById('screen-over').style.display = 'flex';
}

// ═══════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════
function startCountdown() {
  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-over').style.display  = 'none';
  const countEl = document.getElementById('screen-count');
  const numEl   = document.getElementById('count-num');
  countEl.style.display = 'flex';
  let n = 3; numEl.textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) { clearInterval(iv); countEl.style.display = 'none'; startGame(); }
    else numEl.textContent = n;
  }, 800);
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
function startGame() {
  score = 0; speed = 3; pathOffset = 0; particles = []; jumpCount = 0;
  runner.dead = false; runner.vy = 0; runner.onGround = true; runner.deathTimer = 0;
  buildPath();
  runner.x = canvas.width / 2;
  runner.y = canvas.height * RUNNER_Y_RATIO;
  state = 'playing';
}

// ═══════════════════════════════════════════
// DRAW BACKGROUND
// ═══════════════════════════════════════════
function drawBackground() {
  const W = canvas.width, H = canvas.height;
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#020408'); bg.addColorStop(1, '#080b0f');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1e2a35'; ctx.lineWidth = 0.5;
  const gridSize = 40, offsetY = pathOffset % gridSize;
  for (let y = -offsetY; y < H; y += gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x = 0; x < W; x += gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
}

// ═══════════════════════════════════════════
// DRAW PATH
// ═══════════════════════════════════════════
function drawPath() {
  const W = canvas.width, H = canvas.height;
  const runnerScreenY = H * RUNNER_Y_RATIO;

  for (let i = 0; i < pathSegs.length; i++) {
    const seg     = pathSegs[i];
    const nextSeg = pathSegs[i + 1] || seg;
    const segScreenY = i * SEG_HEIGHT - pathOffset + runnerScreenY;
    const segBottomY = segScreenY + SEG_HEIGHT;
    if (segBottomY < 0 || segScreenY > H) continue;

    const leftTop  = seg.centerX     - seg.width / 2;
    const rightTop = seg.centerX     + seg.width / 2;
    const leftBot  = nextSeg.centerX - nextSeg.width / 2;
    const rightBot = nextSeg.centerX + nextSeg.width / 2;

    ctx.fillStyle = seg.type === 'narrow' ? '#0a1a0a' : '#0d1f2d';
    ctx.beginPath();
    ctx.moveTo(leftTop,  segScreenY); ctx.lineTo(rightTop, segScreenY);
    ctx.lineTo(rightBot, segBottomY); ctx.lineTo(leftBot,  segBottomY);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = seg.type === 'narrow' ? '#00ff44' : '#00aaff';
    ctx.lineWidth = 1.5; ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(leftTop, segScreenY); ctx.lineTo(leftBot, segBottomY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rightTop, segScreenY); ctx.lineTo(rightBot, segBottomY); ctx.stroke();
    ctx.globalAlpha = 1;

    // Fire walls
    for (let fy = segScreenY; fy < segBottomY; fy += 18) {
      if (Math.random() < 0.3) spawnFire(leftTop  - 8 + Math.random() * 8, fy);
      if (Math.random() < 0.3) spawnFire(rightTop + Math.random() * 8,      fy);
    }

    // Obstacle — uses getObsRect for consistent Y
    if (seg.obstacle) {
      const o = getObsRect(seg, i);
      ctx.fillStyle = '#ff4455';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.shadowColor = '#ff4455'; ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ff8888'; ctx.lineWidth = 1;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.shadowBlur = 0;
      // Spikes
      ctx.fillStyle = '#ff8888';
      const spikeCount = Math.floor(o.w / 10);
      for (let s = 0; s < spikeCount; s++) {
        const sx = o.x + s * (o.w / spikeCount);
        ctx.beginPath();
        ctx.moveTo(sx, o.y);
        ctx.lineTo(sx + o.w / spikeCount / 2, o.y - 10);
        ctx.lineTo(sx + o.w / spikeCount, o.y);
        ctx.closePath(); ctx.fill();
      }
    }
  }
}

// ═══════════════════════════════════════════
// DRAW RUNNER
// ═══════════════════════════════════════════
function drawRunner() {
  const x = runner.x, y = runner.y;
  const RW = runner.width, RH = runner.height;
  const t  = Date.now() / 100;

  ctx.save();
  ctx.translate(x, y);
  if (runner.dead) {
    ctx.rotate(Math.PI / 4 * Math.min(runner.deathTimer / 20, 1));
    ctx.globalAlpha = Math.max(0, 1 - runner.deathTimer / 40);
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,170,255,0.15)';
  ctx.beginPath(); ctx.ellipse(0, RH/2+4, RW*0.7, 4, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle = '#00aaff'; ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 10;
  ctx.fillRect(-RW/2, -RH/2, RW, RH * 0.55);

  // Head
  ctx.beginPath(); ctx.arc(0, -RH/2 - 8, 8, 0, Math.PI*2);
  ctx.fillStyle = '#e0eaf4'; ctx.fill();

  // Legs
  ctx.shadowBlur = 0;
  const legSwing = runner.onGround ? Math.sin(t) * 8 : 0;
  ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-4, RH*0.05); ctx.lineTo(-6 + legSwing, RH/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 4, RH*0.05); ctx.lineTo( 6 - legSwing, RH/2); ctx.stroke();

  // Arms
  const armSwing = runner.onGround ? Math.sin(t + Math.PI) * 10 : 0;
  ctx.strokeStyle = '#7dd3fc'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-RW/2, -RH/4); ctx.lineTo(-RW/2-8, -RH/4+armSwing); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( RW/2, -RH/4); ctx.lineTo( RW/2+8, -RH/4-armSwing); ctx.stroke();

  ctx.restore(); ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ═══════════════════════════════════════════
// DRAW HUD
// ═══════════════════════════════════════════
function drawHUD() {
  const W = canvas.width;
  const tiltPx = tiltX * 60;
  ctx.fillStyle = '#1e2a35'; ctx.fillRect(W/2-60, 12, 120, 8);
  ctx.fillStyle = Math.abs(tiltX) > 0.7 ? '#ff4455' : '#00aaff';
  ctx.fillRect(W/2 + Math.min(0, tiltPx), 12, Math.abs(tiltPx), 8);
  ctx.fillStyle = '#4a6070'; ctx.font = '9px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('TILT', W/2, 32);

  // Runner trail
  ctx.fillStyle = 'rgba(0,170,255,0.08)';
  for (let i = 1; i <= 5; i++) {
    ctx.beginPath(); ctx.arc(runner.x, runner.y + i*6, runner.width/2*(1-i*0.15), 0, Math.PI*2); ctx.fill();
  }
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  drawBackground();

  if (state !== 'playing' && state !== 'dead') {
    drawPath(); drawParticles(); return;
  }

  // Keyboard input
  if (keys['ArrowLeft'])  tiltX = Math.max(-1, tiltX - 0.05);
  if (keys['ArrowRight']) tiltX = Math.min( 1, tiltX + 0.05);
  if (!keys['ArrowLeft'] && !keys['ArrowRight']) tiltX *= 0.9;
  if (keys['ArrowUp'])    tiltSpeed =  0.5;
  if (keys['ArrowDown'])  tiltSpeed = -0.5;
  if (!keys['ArrowUp'] && !keys['ArrowDown']) tiltSpeed = 0;

  if (!runner.dead) {
    // Speed
    const targetSpeed = 3 + score / 300 + tiltSpeed * 1.5;
    speed += (targetSpeed - speed) * 0.02;
    speed  = Math.max(1.5, Math.min(12, speed));

    // Scroll
    pathOffset += speed * dt;
    score      += speed * dt * 0.1;

    const segsPassed = Math.floor(pathOffset / SEG_HEIGHT);
    if (segsPassed > 0) {
      for (let i = 0; i < segsPassed; i++) extendPath();
      pathOffset -= segsPassed * SEG_HEIGHT;
    }

    // Runner X
    const runnerScreenY = canvas.height * RUNNER_Y_RATIO;
    runner.y = runnerScreenY;
    runner.x += tiltX * speed * 1.8 * dt;
    runner.x  = Math.max(runner.width, Math.min(canvas.width - runner.width, runner.x));

    // Jump physics
    if (!runner.onGround) {
      runner.vy += GRAVITY * dt;
      runner.y  += runner.vy * dt;
      if (runner.y >= runnerScreenY) {
        runner.y = runnerScreenY; runner.vy = 0; runner.onGround = true; jumpCount = 0;
        spawnDust(runner.x, runner.y + runner.height / 2);
      }
    }

    // ── Path collision ────────────────
    const seg = (() => {
      const worldY = (runner.y - canvas.height * RUNNER_Y_RATIO) + pathOffset;
      const idx    = Math.floor(worldY / SEG_HEIGHT);
      // runner sits at seam of seg 0 and 1 — check seg 0
      const checkIdx = 0;
      return pathSegs[checkIdx] || null;
    })();
    // Always check the segment the runner visually stands on (index 0 after offset sync)
    const currentSeg = pathSegs[0];
    if (currentSeg) {
      const left  = currentSeg.centerX - currentSeg.width / 2;
      const right = currentSeg.centerX + currentSeg.width / 2;
      if (runner.onGround && (runner.x - runner.width/2 < left || runner.x + runner.width/2 > right)) {
        killRunner('FELL INTO THE FIRE');
      }
    }

    // ── Obstacle collision ────────────
    // Use getObsRect — same Y as draw, no mismatch
    pathSegs.forEach((s, i) => {
      if (!s.obstacle) return;
      const o = getObsRect(s, i);

      // Only test when obstacle is within one segment of runner screen Y
      if (Math.abs(o.y - runner.y) > SEG_HEIGHT * 0.8) return;

      const runL = runner.x - runner.width  / 2;
      const runR = runner.x + runner.width  / 2;
      const runT = runner.y - runner.height / 2;
      const runB = runner.y + runner.height / 2;

      if (runR > o.x && runL < o.x + o.w && runB > o.y && runT < o.y + o.h) {
        if (runner.onGround) killRunner('HIT AN OBSTACLE');
      }
    });

    // HUD
    document.getElementById('hud-score').textContent = Math.floor(score);
    document.getElementById('hud-best').textContent  = Math.max(bestScore, Math.floor(score));
    document.getElementById('hud-speed').textContent = speed.toFixed(1) + 'x';
  } else {
    runner.deathTimer = (runner.deathTimer || 0) + dt;
  }

  updateParticles();
  drawPath();
  drawParticles();
  drawRunner();
  drawHUD();
}

requestAnimationFrame(loop);

// ═══════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════
let ws = null, wsRoll = 0, wsPitch = 0, smoothG = 0;

function setStatus(on) {
  document.getElementById('status-dot').className    = on ? 'connected' : '';
  document.getElementById('status-text').textContent = on ? 'LIVE' : 'OFFLINE';
}

document.getElementById('connect-btn').addEventListener('click', () => {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) return;
  if (ws) ws.close();
  ws = new WebSocket(`ws://${ip}:81`);
  ws.onopen  = () => setStatus(true);
  ws.onclose = () => setStatus(false);
  ws.onerror = () => setStatus(false);

  ws.onmessage = ({ data }) => {
    const d = JSON.parse(data);
    const dt = 0.05, alpha = 0.96;
    wsRoll  = alpha * (wsRoll  + d.gx * dt * Math.PI/180) + (1-alpha) * Math.atan2(d.ay, d.az);
    wsPitch = alpha * (wsPitch + d.gy * dt * Math.PI/180) + (1-alpha) * Math.atan2(-d.ax, Math.sqrt(d.ay**2 + d.az**2));

    const rollDeg  = wsRoll  * 180 / Math.PI;
    const pitchDeg = wsPitch * 180 / Math.PI;

    tiltX     = Math.max(-1, Math.min(1, rollDeg  / 45));
    tiltSpeed = Math.max(-1, Math.min(1, pitchDeg / 45));

    document.getElementById('hud-roll').textContent = rollDeg.toFixed(1) + '°';

    const mag  = Math.sqrt(d.ax**2 + d.ay**2 + d.az**2);
    smoothG    = 0.7 * smoothG + 0.3 * Math.abs(mag - 1.0);
    if (smoothG > 1.2) triggerJump();
  };
});

// ═══════════════════════════════════════════
// BUTTONS
// ═══════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click',   startCountdown);
document.getElementById('restart-btn').addEventListener('click', startCountdown);
</script>
